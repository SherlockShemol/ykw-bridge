name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  APP_NAME: YKW Bridge
  RELEASE_ASSET_PREFIX: YKW-Bridge

jobs:
  release:
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate release versions
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          TAURI_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")
          CARGO_VERSION=$(python3 - <<'PY'
          import pathlib
          import re

          text = pathlib.Path('src-tauri/Cargo.toml').read_text()
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not match:
              raise SystemExit('missing version in src-tauri/Cargo.toml')
          print(match.group(1))
          PY
          )

          [ "$PKG_VERSION" = "$TAG" ] || { echo "package.json version $PKG_VERSION != tag $TAG" >&2; exit 1; }
          [ "$TAURI_VERSION" = "$TAG" ] || { echo "tauri.conf.json version $TAURI_VERSION != tag $TAG" >&2; exit 1; }
          [ "$CARGO_VERSION" = "$TAG" ] || { echo "Cargo.toml version $CARGO_VERSION != tag $TAG" >&2; exit 1; }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 60
        run: |
          set -euo pipefail
          pnpm tauri build --target universal-apple-darwin

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"

          APP_PATH=""
          DMG_PATH=""
          UPDATER_PATH=""
          UPDATER_SIG_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle" \
            "src-tauri/target/release/bundle"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -name "*.app" -type d | head -1 || true)
              [ -z "$DMG_PATH" ] && DMG_PATH=$(find "$path" -name "*.dmg" -type f | head -1 || true)
              [ -z "$UPDATER_PATH" ] && UPDATER_PATH=$(find "$path" -name "*.app.tar.gz" -type f | head -1 || true)
              [ -z "$UPDATER_SIG_PATH" ] && UPDATER_SIG_PATH=$(find "$path" -name "*.app.tar.gz.sig" -type f | head -1 || true)
            fi
          done

          [ -n "$APP_PATH" ] || { echo "No .app found" >&2; exit 1; }
          [ -n "$UPDATER_PATH" ] || { echo "No macOS updater archive found" >&2; exit 1; }
          [ -n "$UPDATER_SIG_PATH" ] || { echo "No macOS updater signature found" >&2; exit 1; }

          NEW_ZIP="${RELEASE_ASSET_PREFIX}-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"

          if [ -n "$DMG_PATH" ]; then
            NEW_DMG="${RELEASE_ASSET_PREFIX}-${VERSION}-macOS.dmg"
            cp "$DMG_PATH" "release-assets/$NEW_DMG"
          fi

          MACOS_UPDATER="${RELEASE_ASSET_PREFIX}-${VERSION}-macOS.app.tar.gz"
          cp "$UPDATER_PATH" "release-assets/$MACOS_UPDATER"
          cp "$UPDATER_SIG_PATH" "release-assets/$MACOS_UPDATER.sig"

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME

          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          $msiSig = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi.sig -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            throw 'No Windows MSI installer found'
          }
          if ($null -eq $msiSig) {
            throw 'No Windows MSI updater signature found'
          }

          $dest = "${env:RELEASE_ASSET_PREFIX}-$VERSION-Windows.msi"
          Copy-Item $msi.FullName (Join-Path release-assets $dest)
          Copy-Item $msiSig.FullName (Join-Path release-assets "$dest.sig")

          $exeCandidates = @(
            'src-tauri/target/release/ykw-bridge.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/ykw-bridge.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = Join-Path 'release-assets' "${env:RELEASE_ASSET_PREFIX}-Portable"
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            $portableContent = @(
              '# YKW Bridge portable build marker',
              'portable=true'
            )
            $portableContent | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/${env:RELEASE_ASSET_PREFIX}-$VERSION-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.arch || 'x86_64' }}"

          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          APPIMAGE_SIG=$(find src-tauri/target/release/bundle -name "*.AppImage.sig" | head -1 || true)
          [ -n "$APPIMAGE" ] || { echo "No AppImage found under target/release/bundle" >&2; exit 1; }
          [ -n "$APPIMAGE_SIG" ] || { echo "No AppImage signature found under target/release/bundle" >&2; exit 1; }

          NEW_APPIMAGE="${RELEASE_ASSET_PREFIX}-${VERSION}-Linux-${ARCH}.AppImage"
          cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
          cp "$APPIMAGE_SIG" "release-assets/$NEW_APPIMAGE.sig"

          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/${RELEASE_ASSET_PREFIX}-${VERSION}-Linux-${ARCH}.deb"
          fi

          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-assets/${RELEASE_ASSET_PREFIX}-${VERSION}-Linux-${ARCH}.rpm"
          fi

      - name: List prepared assets
        shell: bash
        run: |
          ls -la release-assets || true

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          if-no-files-found: error

      - name: List generated bundles (debug)
        if: always()
        shell: bash
        run: |
          echo "Listing bundles in src-tauri/target..."
          find src-tauri/target -maxdepth 4 -type f -name "*.*" 2>/dev/null || true

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Generate updater manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime
          import json
          import os
          from pathlib import Path

          assets_dir = Path('release-assets')
          tag = os.environ['GITHUB_REF_NAME']
          repo = os.environ['GITHUB_REPOSITORY']
          prefix = os.environ['RELEASE_ASSET_PREFIX']
          version = tag[1:] if tag.startswith('v') else tag

          def add_platform(platforms, key, filename):
              asset_path = assets_dir / filename
              sig_path = assets_dir / f'{filename}.sig'
              if asset_path.exists() and sig_path.exists():
                  platforms[key] = {
                      'url': f'https://github.com/{repo}/releases/download/{tag}/{filename}',
                      'signature': sig_path.read_text().strip(),
                  }

          platforms = {}
          add_platform(platforms, 'windows-x86_64', f'{prefix}-{tag}-Windows.msi')
          add_platform(platforms, 'linux-x86_64', f'{prefix}-{tag}-Linux-x86_64.AppImage')
          add_platform(platforms, 'linux-aarch64', f'{prefix}-{tag}-Linux-arm64.AppImage')

          macos_filename = f'{prefix}-{tag}-macOS.app.tar.gz'
          macos_asset = assets_dir / macos_filename
          macos_sig = assets_dir / f'{macos_filename}.sig'
          if macos_asset.exists() and macos_sig.exists():
              signature = macos_sig.read_text().strip()
              url = f'https://github.com/{repo}/releases/download/{tag}/{macos_filename}'
              platforms['darwin-x86_64'] = {'url': url, 'signature': signature}
              platforms['darwin-aarch64'] = {'url': url, 'signature': signature}

          if not platforms:
              raise SystemExit('no updater platforms found in release-assets')

          manifest = {
              'version': version,
              'notes': f'{os.environ["APP_NAME"]} {tag}',
              'pub_date': datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'platforms': platforms,
          }
          (assets_dir / 'latest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          PY

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          TITLE="${APP_NAME} ${TAG}"
          NOTES_FILE="$(mktemp)"
          trap 'rm -f "$NOTES_FILE"' EXIT

          cat > "$NOTES_FILE" <<EOF
          ## ${APP_NAME} ${TAG}

          Claude Code + Claude Desktop 专版管理工具

          ### 下载

          - **macOS**: \

            - 直接安装：\`${RELEASE_ASSET_PREFIX}-${TAG}-macOS.dmg\`（若已生成）或 \`${RELEASE_ASSET_PREFIX}-${TAG}-macOS.zip\`
            - 自动更新：\`${RELEASE_ASSET_PREFIX}-${TAG}-macOS.app.tar.gz\` + `.sig`
          - **Windows**:
            - 安装版：\`${RELEASE_ASSET_PREFIX}-${TAG}-Windows.msi\` + `.sig`
            - 绿色版：\`${RELEASE_ASSET_PREFIX}-${TAG}-Windows-Portable.zip\`
          - **Linux (x86_64)**: \`${RELEASE_ASSET_PREFIX}-${TAG}-Linux-x86_64.AppImage\` + `.sig` / `.deb` / `.rpm`
          - **Linux (ARM64)**: \`${RELEASE_ASSET_PREFIX}-${TAG}-Linux-arm64.AppImage\` + `.sig` / `.deb` / `.rpm`
          - **Updater manifest**: \`latest.json\`
          EOF

          release_id="$(
            gh api --paginate "/repos/${GITHUB_REPOSITORY}/releases" \
              --jq ".[] | select(.tag_name == \"${TAG}\") | .id" \
              | head -n 1
          )"

          if [ -n "${release_id}" ]; then
            body="$(cat "$NOTES_FILE")"
            gh api \
              --method PATCH \
              "/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -f name="${TITLE}" \
              -f body="${body}" \
              -F draft=false \
              -F prerelease=false >/dev/null
          else
            gh release create "${TAG}" \
              --title "${TITLE}" \
              --notes-file "${NOTES_FILE}"
          fi

          gh release upload "${TAG}" release-assets/* --clobber
